# Phase 1: HTTP-only vhost — serves the static site + ACME challenge so
# certbot --webroot can validate before any TLS cert exists.
# Host path: /etc/icontainer/apps/openresty/openresty/conf/conf.d/users/rendavivaapp.online.conf
# (mounted into the openresty container at /usr/local/openresty/nginx/conf/conf.d/)
server {
    listen 80;
    server_name rendavivaapp.online www.rendavivaapp.online;
    root /www/sites/rendavivaapp.online;
    index index.html;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
