# Renda Viva landing page — static site on rendavivaapp.online (OpenResty / iContainer).
# Host path: /etc/icontainer/apps/openresty/openresty/conf/conf.d/users/rendavivaapp.online.conf
#   -> mounted into container as /usr/local/openresty/nginx/conf/conf.d/rendavivaapp.online.conf
# Cert files live in the container-mounted ssl dir (container can't see /etc/letsencrypt).
server {
    listen 80;
    server_name rendavivaapp.online www.rendavivaapp.online;

    # Keep ACME challenge reachable over HTTP for future renewals.
    location ^~ /.well-known/acme-challenge/ {
        root /www/sites/rendavivaapp.online;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name rendavivaapp.online www.rendavivaapp.online;

    ssl_certificate     /usr/local/openresty/nginx/conf/conf.d/ssl/rendavivaapp.online.fullchain.pem;
    ssl_certificate_key /usr/local/openresty/nginx/conf/conf.d/ssl/rendavivaapp.online.privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000";

    root /www/sites/rendavivaapp.online;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
